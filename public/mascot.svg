<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" role="img" aria-label="ShoppingMole mascot">
  <g id="mole-base" fill="white" stroke="#1e2d3d" stroke-linecap="round" stroke-linejoin="round">
    <!-- Crown puffs -->
    <circle cx="91" cy="28" r="5" stroke-width="2.5"/>
    <circle cx="100" cy="22" r="6" stroke-width="2.5"/>
    <circle cx="109" cy="28" r="5" stroke-width="2.5"/>
    <!-- Head -->
    <circle cx="100" cy="83" r="57" stroke-width="3.5"/>
    <!-- Left lens -->
    <circle cx="81" cy="89" r="19" stroke-width="4"/>
    <!-- Right lens -->
    <circle cx="119" cy="89" r="19" stroke-width="4"/>
    <!-- Bridge -->
    <line x1="100" y1="87" x2="100" y2="92" stroke-width="3"/>
    <!-- Temple arms -->
    <line x1="62" y1="89" x2="55" y2="89" stroke-width="3"/>
    <line x1="138" y1="89" x2="145" y2="89" stroke-width="3"/>
    <!-- Left pupil -->
    <circle cx="81" cy="89" r="9" fill="#1e2d3d" stroke="none"/>
    <circle cx="84" cy="86" r="3.5" fill="white" stroke="none"/>
    <!-- Right pupil -->
    <circle cx="119" cy="89" r="9" fill="#1e2d3d" stroke="none"/>
    <circle cx="122" cy="86" r="3.5" fill="white" stroke="none"/>
    <!-- Nose -->
    <ellipse cx="100" cy="113" rx="6" ry="4.5" fill="#1e2d3d" stroke="none"/>
    <!-- Ledge -->
    <rect x="20" y="130" width="160" height="18" rx="7" stroke-width="3.5"/>
    <!-- Left paw -->
    <ellipse cx="50" cy="130" rx="20" ry="11" stroke-width="3"/>
    <path d="M37,126 Q43,119 50,122 Q57,119 63,126" fill="none" stroke-width="2"/>
    <!-- Right paw -->
    <ellipse cx="150" cy="130" rx="20" ry="11" stroke-width="3"/>
    <path d="M137,126 Q143,119 150,122 Q157,119 163,126" fill="none" stroke-width="2"/>
  </g>

  <g id="prop" fill="white" stroke="#1e2d3d" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left shopping bag -->
    <!-- Bag handle (arc connecting to paw) -->
    <path d="M23,140 C23,128 47,128 47,140" fill="none" stroke-width="2.5"/>
    <!-- Bag body (trapezoid, wider at top) -->
    <path d="M18,140 L52,140 L57,186 L13,186 Z" stroke-width="2.5"/>
    <!-- Bag label box -->
    <rect x="22" y="153" width="26" height="18" rx="2" fill="none" stroke-width="1.5"/>
    <!-- Bag label lines -->
    <line x1="25" y1="159" x2="45" y2="159" stroke-width="1.5" opacity="0.5"/>
    <line x1="25" y1="164" x2="45" y2="164" stroke-width="1.5" opacity="0.5"/>

    <!-- Right shopping bag -->
    <!-- Bag handle -->
    <path d="M153,140 C153,128 177,128 177,140" fill="none" stroke-width="2.5"/>
    <!-- Bag body -->
    <path d="M148,140 L182,140 L187,186 L143,186 Z" stroke-width="2.5"/>
    <!-- Bag label box -->
    <rect x="152" y="153" width="26" height="18" rx="2" fill="none" stroke-width="1.5"/>
    <!-- Bag label lines -->
    <line x1="155" y1="159" x2="175" y2="159" stroke-width="1.5" opacity="0.5"/>
    <line x1="155" y1="164" x2="175" y2="164" stroke-width="1.5" opacity="0.5"/>
  </g>
</svg>
